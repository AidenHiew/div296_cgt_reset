name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [init/v1.0, main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Lint (ruff)
        run: ruff check src tests scripts

      - name: Test (pytest, parallel; slow tests skipped)
        # v1.7's LARGE/MATCH/INDEX dependency graph OOMs the pure-Python
        # `formulas` recalc on standard runners. The integration test is
        # marked `slow` and run manually via Excel/LibreOffice.
        run: pytest -q -n auto -m "not slow"

      - name: Build (recalc validation skipped on CI — see note above)
        run: python -m div296.build --no-validate

      - name: Upload built workbook
        if: matrix.python-version == '3.13'
        uses: actions/upload-artifact@v4
        with:
          name: Division_296_Model
          path: dist/Division_296_Model_v*.xlsx
          if-no-files-found: error
